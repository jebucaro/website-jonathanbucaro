# Markdown rendering configuration
# Only non-default values are included to keep configuration clean

goldmark:
    renderer:
        unsafe: true # Allow raw HTML in markdown content
    parser:
        attribute:
            block: true # Enable markdown attributes for block elements
            title: true # Enable markdown attributes for headings

highlight:
    guessSyntax: true # Auto-detect code block language
    noClasses: false # Use CSS classes for syntax highlighting (requires external CSS)
    style: github # Syntax highlighting color scheme

tableOfContents:
    endLevel: 4 # Include h2, h3, and h4 in table of contents
