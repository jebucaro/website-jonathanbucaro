baseURL: 'https://jonathanbucaro.com/'
defaultContentLanguage: en
defaultContentLanguageInSubdir: false
languageCode: es-us
title: Jonathan Búcaro
theme: hilton
pagination:
    pagerSize: 6
build:
    writeStats: true
    processing:
        css:
            minify: true
            postcss: true
        sass:
            enable: true
            outputStyle: compressed
outputFormats:
  RobotsTXT:
    mediaType: text/plain
    baseName: robots
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - HTML
    - RSS
    - RobotsTXT
    - Sitemap
