baseURL: 'https://jonathanbucaro.com/'

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

languages:
    en:
        languageCode: en-us
        languageName: English
        languageDirection: ltr
        weight: 1
        title: Jonathan Búcaro

    es:
        languageCode: es-GT
        languageName: Español
        languageDirection: ltr
        weight: 2
        title: Jonathan Búcaro
theme: hilton
pagination:
    pagerSize: 6
build:
    writeStats: true
    useResourceCacheWhen: fallback
    processing:
        css:
            minify: true
            postcss: true
        js:
            minify: true
        html:
            minify: true
        sass:
            enable: true
            outputStyle: compressed
outputFormats:
    RobotsTXT:
        mediaType: text/plain
        baseName: robots
        isPlainText: true
        notAlternative: true

outputs:
    home:
        - HTML
        - RSS
        - RobotsTXT
