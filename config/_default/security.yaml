# Security configuration
## Hugo build-time security settings (commands, external resources, environment variables)
csp:
    default-src:
        - "'self'"
    script-src:
        - "'self'"
        - 'https://cdn.jsdelivr.net'
exec:
    allow:
        - ^(dart-)?sass(-embedded)?$
        - ^go$
        - ^postcss$
        - ^tailwindcss$
    osEnv:
        - (?i)^((HTTPS?|NO)_PROXY|PATH(EXT)?|APPDATA|TE?MP|TERM|GO\w+|(XDG_)?CACHE_HOME|YARN_CACHE_FOLDER)$

funcs:
    getenv:
        - ^HUGO_
        - ^CI$
        - ^GITHUB_
        - ^NETLIFY_
        - ^VERCEL_
