# SEO and meta configuration
sitemap:
    changefreq: monthly
    filename: sitemap.xml
    priority: 0.5

# Privacy configuration
# Note: googleAnalytics privacy settings removed - handled in custom implementation (assets/js/ga-init.js)
privacy:
    disqus:
        disable: true
    instagram:
        disable: false
    twitter:
        disable: false
        enableDNT: true
        simple: true
    vimeo:
        disable: false
        enableDNT: true
        simple: true
    youtube:
        disable: false
        privacyEnhanced: true

# Caching configuration
# Build-time caches for Hugo resource processing (different from Firebase runtime caching)
caches:
    assets:
        dir: ':resourceDir/_gen'
        maxAge: 8760h # 1 year - Caches compiled SASS/CSS and processed JS
    images:
        dir: ':resourceDir/_gen'
        maxAge: 8760h # 1 year - Caches processed/resized images
