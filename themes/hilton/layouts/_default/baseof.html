<!doctype html>
<html
  lang="{{ .Site.LanguageCode }}"
  data-color-scheme="{{ .Site.Params.color_scheme }}"
>
  {{ partial "head.html" . }}


  <body>
    {{ template "_internal/google_analytics.html" . }}

    {{ partial "header.html" . }}


    <!-- begin content -->
    <main class="content" aria-label="Content">
      {{ block "main" . }}{{ end }}
    </main>
    <!-- end content -->

    {{ partial "footer.html" . }}

    {{ partial "javascripts.html" . }}
  </body>
</html>
