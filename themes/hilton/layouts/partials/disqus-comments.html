{{ if .Site.Params.disqus.enable }}
    <!-- begin comments -->
    <div class="show-comments">
        <button class="button button--primary" id="show-comments-button" onclick="disqus();return false;">{{ i18n "ui.comments" }}</button>
    </div>

    <div id="disqus_thread" class="post__comments">
        <div id="disqus_empty"></div>
    </div>

    {{ $disqusjs := resources.Get "js/disqus.js" }}
    {{ if hugo.IsServer }}
        <script src="{{ $disqusjs.Permalink }}"></script>
    {{ else }}
        <script src="{{ ($disqusjs | minify | fingerprint).RelPermalink }}"></script>
    {{ end }}


    <!-- end comments -->
{{ end }}
