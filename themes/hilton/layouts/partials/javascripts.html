{{ $script := resources.Get "js/scripts.js" }}
{{ $commonJs := resources.Get "js/common.js" }}

{{ if hugo.IsServer }}
    <script src="{{ $script.Permalink | absURL }}"></script>
    <script src="{{ $commonJs.Permalink | absURL }}"></script>
{{ else }}
    <script src="{{ ($script | minify | fingerprint).RelPermalink | absURL }}"></script>
    <script src="{{ ($commonJs | minify | fingerprint).RelPermalink | absURL }}"></script>
{{ end }}
