<div class="post__share">
  <ul class="share__list list-reset">
    <li class="share__item">
      <a
        class="share__link share__linkedin"
        href="https://www.linkedin.com/shareArticle?mini=true&amp;url={{ .Permalink | absLangURL }}&amp;source={{ .Permalink | absLangURL }}&amp;title={{ .Title }}&amp;summary={{ .Title }}"
        title="Compartir en LinkedIn"
        target="_blank"
        rel="nofollow noopener"
        aria-label="Compartir en LinkedIn"
        ><i class="ion ion-logo-linkedin"></i
      ></a>
    </li>

    <li class="share__item">
      <a
        class="share__link share__twitter"
        href="https://twitter.com/intent/tweet?text={{ .Title }}&url={{ .Permalink | absLangURL }}"
        title="Compartir en Twitter"
        target="_blank"
        rel="nofollow noopener"
        ><i class="ion ion-logo-twitter"></i
      ></a>
    </li>

    <li class="share__item">
      <a
        class="share__link share__facebook"
        href="https://www.facebook.com/sharer/sharer.php?u={{ .Permalink | absLangURL }}"
        title="Compartir en Facebook"
        target="_blank"
        rel="nofollow noopener"
        ><i class="ion ion-logo-facebook"></i
      ></a>
    </li>

    <li class="share__item">
      <a
        class="share__link share__pinterest"
        href="https://pinterest.com/pin/create/button/?url={{ .Permalink | absLangURL }}&amp;media={{ .Params.image | absURL }}&amp;description={{ .Title }}"
        title="Compartir en Pinterest"
        target="_blank"
        rel="nofollow noopener"
        aria-label="Compartir en Pinterest"
        ><i class="ion ion-logo-pinterest"></i
      ></a>
    </li>

    <li class="share__item">
      <a
        class="share__link share__whatsapp"
        href="whatsapp://send?text={{ .Permalink | absLangURL }}"
        title="Compartir en WhatsApp"
        target="_blank"
        rel="nofollow noopener"
        ><i class="ion ion-logo-whatsapp"></i
      ></a>
    </li>
  </ul>
</div>
