{{- if not (.Page.Scratch.Get "hasChartJS") -}}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Detect dark/light mode and set Chart.js default color
    function setChartColorScheme() {
        const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        Chart.defaults.color = isDark ? '#fff' : '#222';
        // Optionally set background color for charts
        Chart.defaults.backgroundColor = isDark ? '#222' : '#fff';
    }
    setChartColorScheme();
    // Listen for changes in color scheme
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', setChartColorScheme);
</script>
{{- .Page.Scratch.Set "hasChartJS" true -}}
{{- end -}}

{{- $id := substr (md5 .Inner) 0 16 -}}
<div class="chart">
    <canvas id="{{ $id }}"></canvas>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
                var ctx = document.getElementById('{{ $id }}');
                var options = {{ .Inner | chomp | safeJS }};
                // Optionally override chart colors based on mode
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    if (options.options && options.options.plugins && options.options.plugins.legend) {
                        options.options.plugins.legend.labels = options.options.plugins.legend.labels || {};
                        options.options.plugins.legend.labels.color = '#fff';
                    }
                } else {
                    if (options.options && options.options.plugins && options.options.plugins.legend) {
                        options.options.plugins.legend.labels = options.options.plugins.legend.labels || {};
                        options.options.plugins.legend.labels.color = '#222';
                    }
                }
                new Chart(ctx, options);
    });
</script>
