{{- if not (.Page.Scratch.Get "hasChartJS") -}}
{{- if not .Page.Summary -}}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5/dist/chart.umd.js"></script>
<script>
  window.chartInstances = window.chartInstances || [];
  
  function getThemeColors() {
    const textColor = getComputedStyle(document.documentElement).getPropertyValue('--text-color').trim() || '#222';
    const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--background-color').trim() || '#fff';
    const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim() || '#ffc71d';
    const isDark = textColor !== '#222';
    const gridColor = isDark ? '#9e9e9e33' : '#22222233';
    
    return { textColor, bgColor, primaryColor, gridColor, isDark };
  }
  
  function setChartDefaults() {
    const colors = getThemeColors();
    Chart.defaults.color = colors.textColor;
    Chart.defaults.backgroundColor = colors.bgColor;
  }
  
  function updateAllCharts() {
    const colors = getThemeColors();
    
    window.chartInstances.forEach(chart => {
      if (chart && chart.options) {
        // Update scales
        if (chart.options.scales) {
          ['x', 'y'].forEach(axis => {
            if (chart.options.scales[axis]) {
              if (chart.options.scales[axis].ticks) {
                chart.options.scales[axis].ticks.color = colors.textColor;
              }
              if (chart.options.scales[axis].grid) {
                chart.options.scales[axis].grid.color = colors.gridColor;
              }
            }
          });
        }
        
        // Update plugins
        if (chart.options.plugins) {
          if (chart.options.plugins.legend && chart.options.plugins.legend.labels) {
            chart.options.plugins.legend.labels.color = colors.textColor;
          }
          if (chart.options.plugins.title) {
            chart.options.plugins.title.color = colors.textColor;
          }
        }
        
        // Update dataset colors with fresh theme palette
        const themePalette = [
          getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim(),
          getComputedStyle(document.documentElement).getPropertyValue('--callout-blue').trim(),
          getComputedStyle(document.documentElement).getPropertyValue('--callout-green').trim(),
          getComputedStyle(document.documentElement).getPropertyValue('--callout-orange').trim(),
          getComputedStyle(document.documentElement).getPropertyValue('--callout-red').trim()
        ];
        
        // Function to generate grayscale variations of a color
        function generateGrayscaleVariations(baseColor, count) {
          const variations = [];
          for (let i = 0; i < count; i++) {
            const opacity = 0.3 + (0.7 * i / (count - 1));
            variations.push(baseColor + Math.floor(opacity * 255).toString(16).padStart(2, '0'));
          }
          return variations;
        }
        
        if (chart.data && chart.data.datasets) {
          chart.data.datasets.forEach((dataset, index) => {
            if (chart.data.datasets.length === 1) {
              // Single dataset
              if (chart.config.type === 'doughnut' || chart.config.type === 'pie') {
                const dataLength = dataset.data.length;
                if (dataLength <= themePalette.length) {
                  dataset.backgroundColor = themePalette.slice(0, dataLength);
                } else {
                  const colorArray = [...themePalette];
                  const remainingCount = dataLength - themePalette.length;
                  colorArray.push(...generateGrayscaleVariations(colorArray[0], remainingCount));
                  dataset.backgroundColor = colorArray;
                }
              } else {
                dataset.backgroundColor = colors.primaryColor;
                dataset.borderColor = colors.primaryColor;
              }
            } else {
              // Multiple datasets: use color palette
              dataset.backgroundColor = themePalette[index % themePalette.length];
              dataset.borderColor = themePalette[index % themePalette.length];
            }
          });
        }
        
        chart.update('none');
      }
    });
  }
  
  setChartDefaults();
  
  // Listen for system color scheme changes
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    setChartDefaults();
    updateAllCharts();
  });
  
  // Watch for theme changes in the DOM (for manual theme toggles)
  const observer = new MutationObserver(() => {
    setChartDefaults();
    updateAllCharts();
  });
  
  // Watch for changes to the root element's attributes (common for theme switches)
  observer.observe(document.documentElement, {
    attributes: true,
    attributeFilter: ['data-theme', 'class', 'dark']
  });
  
  // Also watch for changes to the html element's dark attribute
  if (document.documentElement.hasAttribute('dark') !== undefined) {
    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['dark']
    });
  }
</script>
{{- end -}}
{{- .Page.Scratch.Set "hasChartJS" true -}}
{{- end -}}

{{- if not .Page.Summary -}}
{{- $id := substr (md5 .Inner) 0 16 -}}
<div class="chart">
    <canvas id="{{ $id }}"></canvas>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const ctx = document.getElementById('{{ $id }}');
  const options = {{ .Inner | chomp | safeJS }};
  const colors = getThemeColors();
  
  if (!options.options) options.options = {};
  if (!options.options.scales) options.options.scales = {};
  
  ['x', 'y'].forEach(axis => {
    if (!options.options.scales[axis]) options.options.scales[axis] = {};
    options.options.scales[axis].ticks = options.options.scales[axis].ticks || {};
    options.options.scales[axis].grid = options.options.scales[axis].grid || {};
    options.options.scales[axis].ticks.color = colors.textColor;
    options.options.scales[axis].grid.color = colors.gridColor;
  });
  
  if (!options.options.plugins) options.options.plugins = {};
  if (options.options.plugins.legend) {
    options.options.plugins.legend.labels = options.options.plugins.legend.labels || {};
    options.options.plugins.legend.labels.color = colors.textColor;
  }
  if (options.options.plugins.title) {
    options.options.plugins.title.color = colors.textColor;
  }
  
  // Use theme palette for bar charts
  if (options.data && options.data.datasets) {
    const themePalette = [
      getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim(),
      getComputedStyle(document.documentElement).getPropertyValue('--callout-blue').trim(),
      getComputedStyle(document.documentElement).getPropertyValue('--callout-green').trim(),
      getComputedStyle(document.documentElement).getPropertyValue('--callout-orange').trim(),
      getComputedStyle(document.documentElement).getPropertyValue('--callout-red').trim()
    ];
    
    // Function to generate grayscale variations of a color
    function generateGrayscaleVariations(baseColor, count) {
      const variations = [];
      for (let i = 0; i < count; i++) {
        const opacity = 0.3 + (0.7 * i / (count - 1)); // Range from 30% to 100%
        variations.push(baseColor + Math.floor(opacity * 255).toString(16).padStart(2, '0'));
      }
      return variations;
    }
    
    options.data.datasets.forEach((dataset, index) => {
      if (!dataset.backgroundColor && !dataset.borderColor) {
        if (options.data.datasets.length === 1) {
          // Single dataset
          if (options.type === 'doughnut' || options.type === 'pie') {
            // For pie/doughnut, create colors for each data point
            const dataLength = dataset.data.length;
            if (dataLength <= themePalette.length) {
              dataset.backgroundColor = themePalette.slice(0, dataLength);
            } else {
              // More segments than colors, use palette + grayscale variations
              const colors = [...themePalette];
              const remainingCount = dataLength - themePalette.length;
              colors.push(...generateGrayscaleVariations(colors[0], remainingCount));
              dataset.backgroundColor = colors;
            }
          } else {
            // Single color for other chart types
            dataset.backgroundColor = colors.primaryColor;
            dataset.borderColor = colors.primaryColor;
          }
        } else {
          // Multiple datasets: use color palette
          dataset.backgroundColor = themePalette[index % themePalette.length];
          dataset.borderColor = themePalette[index % themePalette.length];
        }
      }
    });
  }
  
  const chart = new Chart(ctx, options);
  window.chartInstances.push(chart);
});
</script>
{{- else -}}
<p><em>[Chart will be displayed when viewing the full post]</em></p>
{{- end -}}
