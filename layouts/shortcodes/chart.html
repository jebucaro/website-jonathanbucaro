{{- .Page.Scratch.Set "hasChartJS" true -}}

{{- if not .Page.Summary -}}
{{- $id := substr (md5 .Inner) 0 16 -}}
<div class="chart" data-chart-raw="{{ .Inner | chomp }}">
    <canvas id="{{ $id }}"></canvas>
</div>
{{- else -}}
<p><em>[Chart will be displayed when viewing the full post]</em></p>
{{- end -}}
