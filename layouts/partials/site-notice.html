<div id="siteNotice" class="site-notice" role="dialog" aria-label="{{ i18n "consent_banner_title" }}" style="display: none;">
    <div class="site-notice__content">
        <h3 class="site-notice__title">{{ i18n "consent_banner_title" }}</h3>
        <p class="site-notice__text">{{ i18n "consent_banner_text" }}</p>
    </div>
    <div class="site-notice__actions">
        <button id="noticeAcceptBtn" class="site-notice__btn site-notice__btn--primary">{{ i18n "consent_accept" }}</button>
        <button id="noticeDeclineBtn" class="site-notice__btn site-notice__btn--secondary">{{ i18n "consent_decline" }}</button>
    </div>
</div>
