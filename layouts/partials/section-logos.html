{{ if .Site.Params.logos.enable }}
    <!-- begin logos -->
    <section class="section logos animate">
        <div class="container">
            <div class="row">
                <div class="col col-12">
                    <div class="section__info">
                        <h2 class="section__small__title">{{ i18n "sections_logos_title" | safeHTML }}</h2>
                    </div>

                    <ul class="logos__list list-reset">
                        {{ with .Site.Params.logo_item }}
                            {{ range . }}
                                <li class="logos__item">
                                    <a href="{{ .link }}" class="logos__link" rel="noopener nofollow noreferrer" target="_blank">{{ partial "image.html" (dict "image" .image "alt" .name "class" "logos__image" "widths" (slice 240 480) "sizes" "240px") }}</a>
                                </li>
                            {{ end }}
                        {{ end }}
                    </ul>
                </div>
            </div>
        </div>
    </section>
    <!-- end logos -->
{{ end }}
