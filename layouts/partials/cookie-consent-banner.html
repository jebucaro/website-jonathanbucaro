<div id="cookieConsentBanner" class="cookie-consent-banner" role="dialog" aria-label="{{ i18n "consent_banner_title" }}" style="display: none;">
    <div class="cookie-consent-banner__content">
        <h3 class="cookie-consent-banner__title">{{ i18n "consent_banner_title" }}</h3>
        <p class="cookie-consent-banner__text">{{ i18n "consent_banner_text" }}</p>
    </div>
    <div class="cookie-consent-banner__actions">
        <button id="cookieAcceptBtn" class="cookie-consent-banner__btn cookie-consent-banner__btn--accept">{{ i18n "consent_accept" }}</button>
        <button id="cookieDeclineBtn" class="cookie-consent-banner__btn cookie-consent-banner__btn--decline">{{ i18n "consent_decline" }}</button>
    </div>
</div>
