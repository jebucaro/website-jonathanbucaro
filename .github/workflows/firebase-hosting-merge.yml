# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
'on':
    push:
        branches:
            - main
jobs:
    build_and_deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            deployments: write
            statuses: write
        steps:
            - name: Checkout repository and update Hugo themes
              uses: actions/checkout@v6.0.3
              with:
                  submodules: true
                  fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod

            - name: Install Hugo
              uses: peaceiris/actions-hugo@v3
              with:
                  hugo-version: 'latest'
                  extended: true

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6.2.0
              with:
                  node-version: '24.x'
                  cache: 'pnpm'
                  cache-dependency-path: '**/pnpm-lock.yaml'

            - run: pnpm install --frozen-lockfile && pnpm run build

            - uses: FirebaseExtended/action-hosting-deploy@v0.11.0
              with:
                  repoToken: '${{ secrets.GITHUB_TOKEN }}'
                  firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEBSITE_JONATHANBUCARO }}'
                  channelId: live
                  projectId: website-jonathanbucaro
