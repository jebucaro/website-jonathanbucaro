# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on:
    workflow_run:
        workflows:
            - Build and Test
            - Code Quality
        types:
            - completed
jobs:
    build_and_preview:
        if: >-
            ${{
              github.event.workflow_run.conclusion == 'success' &&
              github.event.workflow_run.event == 'pull_request' &&
              github.event.workflow_run.head_repository.full_name == github.repository
            }}
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            deployments: write
            statuses: write
            checks: write
        steps:
            - name: Resolve PR number from head SHA
              id: pr
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
                  REPO: ${{ github.repository }}
              run: |
                  set -euo pipefail

                  pr_number=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/$REPO/commits/$HEAD_SHA/pulls" \
                    | jq -r '.[0].number // empty')

                  if [[ -z "$pr_number" ]]; then
                    echo "No PR found for head SHA $HEAD_SHA. Skipping deploy."
                    echo "pr_number=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

            - name: Check required workflows succeeded
              id: gate
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
                  REPO: ${{ github.repository }}
              run: |
                  set -euo pipefail

                  runs_json=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" \
                    -H "Accept: application/vnd.github+json" \
                    "https://api.github.com/repos/$REPO/actions/runs?event=pull_request&head_sha=$HEAD_SHA&status=completed")

                  build_status=$(echo "$runs_json" | jq -r '.workflow_runs[] | select(.name=="Build and Test") | .conclusion' | head -n 1)
                  quality_status=$(echo "$runs_json" | jq -r '.workflow_runs[] | select(.name=="Code Quality") | .conclusion' | head -n 1)

                  if [[ "$build_status" == "success" && "$quality_status" == "success" ]]; then
                    echo "deploy_ok=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "Build status: ${build_status:-missing}"
                    echo "Quality status: ${quality_status:-missing}"
                    echo "deploy_ok=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Checkout PR branch
              if: steps.gate.outputs.deploy_ok == 'true' && steps.pr.outputs.pr_number != ''
              uses: actions/checkout@v6.0.1
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}
                  submodules: true
                  fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod

            - name: Install Hugo
              if: steps.gate.outputs.deploy_ok == 'true' && steps.pr.outputs.pr_number != ''
              uses: peaceiris/actions-hugo@v3
              with:
                  hugo-version: 'latest'
                  extended: true

            - uses: actions/setup-node@v6.1.0
              if: steps.gate.outputs.deploy_ok == 'true' && steps.pr.outputs.pr_number != ''
              with:
                  node-version: '22.x'
                  cache: 'npm'
                  # The action defaults to search for the dependency file (package-lock.json,
                  # npm-shrinkwrap.json or yarn.lock) in the repository root, and uses its
                  # hash as a part of the cache key.
                  # https://github.com/actions/setup-node/blob/main/docs/advanced-usage.md#caching-packages-data
                  cache-dependency-path: '**/package-lock.json'

            - name: Build Hugo site for staging
              if: steps.gate.outputs.deploy_ok == 'true' && steps.pr.outputs.pr_number != ''
              run: npm ci && npm run build:staging

            - name: Deploy to Firebase Preview Channel
              if: github.event.workflow_run.actor.login != 'dependabot[bot]' && steps.gate.outputs.deploy_ok == 'true' && steps.pr.outputs.pr_number != ''
              uses: FirebaseExtended/action-hosting-deploy@v0.10.0
              with:
                  repoToken: '${{ secrets.GITHUB_TOKEN }}'
                  firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEBSITE_JONATHANBUCARO }}'
                  projectId: website-jonathanbucaro
                  channelId: preview-${{ steps.pr.outputs.pr_number }}
                  expires: 3d
                  disableComment: false
