name: Deploy to Firebase Hosting on PR
'on': pull_request
jobs:
    build_and_preview:
        if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            deployments: write
            statuses: write
            checks: write
        steps:
            - name: Checkout PR branch
              uses: actions/checkout@v7.0.0
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  submodules: true
                  fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod

            - name: Install Hugo
              uses: peaceiris/actions-hugo@v3
              with:
                  hugo-version: 'latest'
                  extended: true

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - uses: actions/setup-node@v6.2.0
              with:
                  node-version: '24.x'
                  cache: 'pnpm'
                  cache-dependency-path: '**/pnpm-lock.yaml'

            - name: Cache Hugo processed images
              uses: actions/cache@v4
              with:
                  path: resources
                  key: hugo-resources-${{ github.run_id }}
                  restore-keys: |
                      hugo-resources-

            - name: Build Hugo site for staging
              run: pnpm install --frozen-lockfile && pnpm run build:staging

            - name: Deploy to Firebase Preview Channel
              if: github.actor != 'dependabot[bot]'
              uses: FirebaseExtended/action-hosting-deploy@v0.10.0
              with:
                  repoToken: '${{ secrets.GITHUB_TOKEN }}'
                  firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEBSITE_JONATHANBUCARO }}'
                  projectId: website-jonathanbucaro
                  channelId: preview-${{ github.event.pull_request.number }}
                  expires: 3d
                  disableComment: false
