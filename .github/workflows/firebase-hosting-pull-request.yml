name: Deploy to Firebase Hosting on PR
on:
  workflow_run:
    workflows:
      - Build and Test
      - Code Quality
    types:
      - completed
jobs:
    build_and_preview:
        if: >-
            ${{
              github.event.workflow_run.conclusion == 'success' &&
              github.event.workflow_run.event == 'pull_request' &&
              github.event.workflow_run.pull_requests[0].number &&
              github.event.workflow_run.head_repository.full_name == github.repository
            }}
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            deployments: write
            statuses: write
            checks: write
        steps:
            - name: Checkout PR branch
              uses: actions/checkout@v6.0.1
              with:
                ref: ${{ github.event.workflow_run.head_sha }}
                  submodules: true
                  fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod

            - name: Install Hugo
              uses: peaceiris/actions-hugo@v3
              with:
                  hugo-version: 'latest'
                  extended: true

            - uses: actions/setup-node@v6.1.0
              with:
                  node-version: '22.x'
                  cache: 'npm'
                  # The action defaults to search for the dependency file (package-lock.json,
                  # npm-shrinkwrap.json or yarn.lock) in the repository root, and uses its
                  # hash as a part of the cache key.
                  # https://github.com/actions/setup-node/blob/main/docs/advanced-usage.md#caching-packages-data
                  cache-dependency-path: '**/package-lock.json'

            - name: Build Hugo site for staging
              run: npm ci && npm run build:staging

            - name: Deploy to Firebase Preview Channel
              if: github.event.workflow_run.actor.login != 'dependabot[bot]'
              uses: FirebaseExtended/action-hosting-deploy@v0.10.0
              with:
                  repoToken: '${{ secrets.GITHUB_TOKEN }}'
                  firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WEBSITE_JONATHANBUCARO }}'
                  projectId: website-jonathanbucaro
                  channelId: preview-${{ github.event.workflow_run.pull_requests[0].number }}
                  expires: 3d
                  disableComment: false
