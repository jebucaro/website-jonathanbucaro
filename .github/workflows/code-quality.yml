name: Code Quality

on:
    pull_request:

jobs:
    format-check:
        name: Format Check (Prettier)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6.0.2

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6.2.0
              with:
                  node-version: '24.x'
                  cache: 'pnpm'
                  cache-dependency-path: '**/pnpm-lock.yaml'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Prettier format check
              run: pnpm run format:check

    markdown-lint:
        name: Markdown Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6.0.2

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6.2.0
              with:
                  node-version: '24.x'
                  cache: 'pnpm'
                  cache-dependency-path: '**/pnpm-lock.yaml'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Markdownlint
              run: pnpm run lint:markdown

    security-audit:
        name: Security Audit
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6.0.2

            - name: Setup pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6.2.0
              with:
                  node-version: '24.x'
                  cache: 'pnpm'
                  cache-dependency-path: '**/pnpm-lock.yaml'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run pnpm security audit
              run: pnpm audit --audit-level=moderate
              continue-on-error: false

    package-age-check:
        name: Package Publication Age Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v6.2.0
              with:
                  node-version: '24.x'

            - name: Check package publication age (≥24h)
              run: node .github/scripts/check-package-age.js --base-branch main
